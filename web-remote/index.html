<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Registrar Práctica</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    padding-top: max(env(safe-area-inset-top), 24px);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 8px;
  }

  .header-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin: 0 auto 14px;
    box-shadow: 0 8px 24px rgba(99,102,241,.35);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  select, input[type="date"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color .15s, box-shadow .15s;
  }

  select:focus, input[type="date"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 14px;
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.2px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow: 0 4px 16px rgba(99,102,241,.4);
  }

  .btn-primary:active { transform: scale(0.97); filter: brightness(.95); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .result {
    display: none;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-top: 16px;
  }

  .result.ok {
    display: block;
    background: #f0fdf4;
    border: 1.5px solid #86efac;
  }

  .result.err {
    display: block;
    background: #fef2f2;
    border: 1.5px solid #fca5a5;
  }

  .result-icon { font-size: 40px; margin-bottom: 8px; }

  .result-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .result.ok .result-title { color: #15803d; }
  .result.err .result-title { color: #dc2626; }

  .result-msg {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .btn-again {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    background: #fff;
    color: var(--primary);
    cursor: pointer;
  }

  .loading-dots span {
    display: inline-block;
    animation: bounce .6s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .1s; }
  .loading-dots span:nth-child(3) { animation-delay: .2s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
  }

  .field-gap { margin-bottom: 16px; }
  .field-gap:last-child { margin-bottom: 0; }

  .alumno-info {
    display: none;
    margin-top: 10px;
    padding: 10px 14px;
    background: #f8fafc;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    background: #e0e7ff;
    color: #4338ca;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🚗</div>
  <h1>Registrar Práctica</h1>
  <p class="subtitle">Autoescuela</p>
</div>

<div id="form-section">
  <div class="card">
    <div class="field-gap">
      <label>Alumno</label>
      <div class="select-wrap">
        <select id="alumno-select" onchange="onAlumnoChange()">
          <option value="">Cargando alumnos...</option>
        </select>
      </div>
      <div class="alumno-info" id="alumno-info"></div>
    </div>

    <div class="field-gap">
      <label>Fecha</label>
      <input type="date" id="fecha-input">
    </div>
  </div>

  <button class="btn btn-primary" id="btn-registrar" onclick="registrar()" disabled>
    <span id="btn-text">✓ Registrar práctica</span>
  </button>
</div>

<div class="result" id="result-ok">
  <div class="result-icon">✅</div>
  <div class="result-title">¡Práctica registrada!</div>
  <div class="result-msg" id="result-ok-msg"></div>
  <button class="btn-again" onclick="resetForm()">Registrar otra práctica</button>
</div>

<div class="result err" id="result-err">
  <div class="result-icon">❌</div>
  <div class="result-title">Error</div>
  <div class="result-msg" id="result-err-msg"></div>
  <button class="btn-again" onclick="hideError()">Volver a intentarlo</button>
</div>

<script>
  let alumnos = [];

  // Poner fecha de hoy por defecto
  const hoy = new Date().toLocaleDateString('sv-SE'); // formato YYYY-MM-DD
  document.getElementById('fecha-input').value = hoy;

  // Cargar alumnos al arrancar
  async function cargarAlumnos() {
    try {
      const res = await fetch('/api/alumnos');
      if (!res.ok) throw new Error('Error cargando alumnos');
      alumnos = await res.json();

      const sel = document.getElementById('alumno-select');
      if (!alumnos.length) {
        sel.innerHTML = '<option value="">No hay alumnos registrados</option>';
        return;
      }

      sel.innerHTML = '<option value="">— Selecciona un alumno —</option>' +
        alumnos.map(a => `<option value="${a.id}">${a.nombre} (${a.permiso})</option>`).join('');

      document.getElementById('btn-registrar').disabled = false;
    } catch (e) {
      document.getElementById('alumno-select').innerHTML =
        '<option value="">Error cargando alumnos</option>';
    }
  }

  function onAlumnoChange() {
    const sel = document.getElementById('alumno-select');
    const info = document.getElementById('alumno-info');
    const btn = document.getElementById('btn-registrar');
    const alumno = alumnos.find(a => a.id == sel.value);

    if (alumno) {
      const tieneVehiculo = !!alumno.vehiculo_id;
      info.style.display = 'block';
      info.innerHTML = tieneVehiculo
        ? `<span class="tag">${alumno.permiso}</span> Permiso ${alumno.permiso}`
        : `<span style="color:#dc2626">⚠ Sin vehículo asignado</span>`;
      btn.disabled = !tieneVehiculo;
    } else {
      info.style.display = 'none';
      btn.disabled = true;
    }
  }

  async function registrar() {
    const alumnoId = document.getElementById('alumno-select').value;
    const fecha    = document.getElementById('fecha-input').value;

    if (!alumnoId) { showError('Selecciona un alumno.'); return; }
    if (!fecha)    { showError('Selecciona una fecha.'); return; }

    const btn  = document.getElementById('btn-registrar');
    const text = document.getElementById('btn-text');
    btn.disabled = true;
    text.innerHTML = '<span class="loading-dots"><span>·</span><span>·</span><span>·</span></span>';

    try {
      const res = await fetch('/api/practica', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ alumno_id: parseInt(alumnoId), fecha })
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showError(data.error || 'Error al registrar la práctica.');
        btn.disabled = false;
        text.innerHTML = '✓ Registrar práctica';
        return;
      }

      // Éxito
      const alumnoNombre = alumnos.find(a => a.id == alumnoId)?.nombre || '';
      const fechaFmt = fecha.split('-').reverse().join('/');
      document.getElementById('result-ok-msg').textContent =
        `${alumnoNombre} — ${fechaFmt}\nKm pendientes de asignar desde la app.`;
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result-ok').style.display = 'block';

    } catch (e) {
      showError('No se pudo conectar con el servidor.');
      btn.disabled = false;
      text.innerHTML = '✓ Registrar práctica';
    }
  }

  function showError(msg) {
    document.getElementById('result-err-msg').textContent = msg;
    document.getElementById('result-err').style.display = 'block';
  }

  function hideError() {
    document.getElementById('result-err').style.display = 'none';
  }

  function resetForm() {
    document.getElementById('result-ok').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('alumno-select').value = '';
    document.getElementById('alumno-info').style.display = 'none';
    document.getElementById('fecha-input').value = new Date().toLocaleDateString('sv-SE');
    document.getElementById('btn-registrar').disabled = true;
    document.getElementById('btn-text').innerHTML = '✓ Registrar práctica';
  }

  cargarAlumnos();
</script>
</body>
</html>
