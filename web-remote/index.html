<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta property="og:title" content="KMAlumnos Web">
<meta property="og:description" content="Registrar prácticas de autoescuela">
<meta name="theme-color" content="#f6f7f9">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%234f46e5'/><g fill='none' stroke='white' stroke-width='7' stroke-linecap='round'><circle cx='50' cy='50' r='26'/><path d='M50 50l11-11'/><path d='M39 61a15 15 0 0 1 22 0'/></g></svg>">
<title>KMAlumnos Web</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  /* ── TOKENS (mismo sistema que el escritorio, adaptado a táctil) ── */
  :root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --primary-light: #eef2ff;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --warn: #f59e0b;
    --warn-light: #fef3c7;
    --text: #101828;
    --text-muted: #667085;
    --border: #e3e6ee;
    --bg: #f6f7f9;
    --card: #ffffff;
    --card-border: #e3e6ee;
    --radius: 16px;
    --shadow: 0 1px 2px rgba(16,24,40,.05);
    --shadow-md: 0 6px 20px rgba(16,24,40,.09), 0 1px 2px rgba(16,24,40,.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    padding-top: max(env(safe-area-inset-top), 24px);
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER / MARCA ── */
  .header { text-align: center; margin-bottom: 26px; padding-top: 12px; animation: slideDown 0.5s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }

  .logo-mark {
    width: 52px; height: 52px; margin: 0 auto 12px; border-radius: 14px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    display: flex; align-items: center; justify-content: center; color: #fff;
    box-shadow: 0 4px 14px rgba(79,70,229,.32);
  }

  h1 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text);
  }

  .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
  .version {
    display: inline-block; margin-top: 10px; font-size: 10.5px; font-weight: 700; letter-spacing: .4px;
    color: #4338ca; background: #e0e7ff; border: 1px solid rgba(67,56,202,.15);
    padding: 3px 10px; border-radius: 99px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border-radius: var(--radius); padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 20px; border: 1px solid var(--border);
    animation: slideUp 0.4s ease-out 0.05s both; position: relative;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* ── FORMS ── */
  label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.6px; margin-bottom: 10px; text-transform: uppercase; }

  select, input[type="date"], input[type="text"], input[type="password"], input[type="email"] {
    width: 100%; padding: 13px 15px; border: 1px solid var(--border); border-radius: 12px;
    font-size: 16px; font-family: inherit; color: var(--text); background: #fff;
    outline: none; -webkit-appearance: none; appearance: none; transition: all .15s ease;
    box-shadow: 0 1px 2px rgba(16,24,40,.04);
  }

  select:focus, input[type="date"]:focus, input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.14);
  }

  input::placeholder { color: #b6bccb; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }

  /* ── BUTTONS ── */
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 13px; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: -0.2px; position: relative;
  }

  .btn-primary {
    background: var(--primary); color: #fff;
    box-shadow: 0 2px 8px rgba(79,70,229,.3);
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:active { transform: scale(0.98); filter: brightness(.95); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-secondary {
    background: #fff; color: var(--primary); border: 1.5px solid var(--border);
    box-shadow: 0 1px 2px rgba(16,24,40,.04); margin-top: 12px;
  }
  .btn-secondary:hover { background: var(--primary-light); border-color: var(--primary); }

  .btn-danger {
    background: var(--danger-light); color: #b91c1c; border: 1.5px solid rgba(239,68,68,.25);
    font-size: 14px; padding: 10px 16px; width: auto; box-shadow: none;
  }
  .btn-danger:hover { background: #fecaca; }

  .result {
    display: none; border-radius: var(--radius); padding: 26px 22px; text-align: center;
    margin-top: 16px; animation: popIn 0.35s cubic-bezier(.17,.67,.35,1.5);
    position: relative; z-index: 10;
  }

  .result.err { cursor: pointer; }

  @keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }

  .result.ok { display: block; background: var(--success-light); border: 1.5px solid #a7f3d0; box-shadow: var(--shadow); }
  .result.err { display: block; background: var(--danger-light); border: 1.5px solid #fecaca; box-shadow: var(--shadow); }

  .result-icon { margin-bottom: 12px; display: flex; align-items: center; justify-content: center; animation: bounceIn 0.4s ease 0.15s both; }
  @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

  .result-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .result.ok .result-title { color: #059669; }
  .result.err .result-title { color: #dc2626; }
  .result.ok .result-icon { color: #059669; }
  .result.err .result-icon { color: #dc2626; }

  .result-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; white-space: pre-line; }

  .btn-again {
    margin-top: 20px; width: 100%; padding: 13px; border: 1.5px solid var(--border);
    border-radius: 13px; font-size: 15px; font-weight: 600; font-family: inherit;
    background: #fff; color: var(--primary); cursor: pointer; transition: all .15s;
  }
  .btn-again:hover { background: var(--primary-light); border-color: var(--primary); }

  .loading-dots span { display: inline-block; animation: bounce .6s infinite; font-size: 24px; }
  .loading-dots span:nth-child(2) { animation-delay: .1s; }
  .loading-dots span:nth-child(3) { animation-delay: .2s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .field-gap { margin-bottom: 20px; }
  .field-gap:last-child { margin-bottom: 0; }

  .alumno-info {
    display: none; margin-top: 12px; padding: 12px 16px; background: var(--primary-light);
    border-radius: 12px; font-size: 13px; color: var(--text-muted); border: 1px solid rgba(79,70,229,.12);
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── BADGES ── */
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 7px; font-size: 12px; font-weight: 700;
    background: #e0e7ff; color: #4338ca; margin-left: 6px; border: 1px solid rgba(67,56,202,.12);
  }

  .btn-ver-practicas {
    display: inline-block; width: auto; margin-top: 8px; padding: 6px 14px;
    border: 1px solid var(--border); border-radius: 10px; font-size: 12px; font-weight: 700;
    font-family: inherit; color: var(--primary); background: #fff;
    cursor: pointer; transition: all .15s ease;
  }
  .btn-ver-practicas:hover { background: var(--primary-light); border-color: var(--primary); }

  .sparkles { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: hidden; }
  .sparkle { position: absolute; width: 5px; height: 5px; border-radius: 50%; animation: sparkle 1.4s ease-out forwards; }
  @keyframes sparkle { 0% { transform: scale(0) translateY(0); opacity: 1; } 100% { transform: scale(1) translateY(-60px); opacity: 0; } }

  /* Tabs (control segmentado) */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px; animation: slideUp 0.4s ease-out 0.03s both;
    background: #eef0f4; border: 1px solid var(--border);
    border-radius: 13px; padding: 4px;
  }
  .tab {
    flex: 1; min-width: 70px; padding: 10px 6px; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 600; font-family: inherit; color: var(--text-muted);
    background: transparent; cursor: pointer; transition: all .15s; text-align: center;
  }
  .tab.active {
    background: var(--primary); color: #fff;
    box-shadow: 0 2px 8px rgba(79,70,229,.3);
  }
  .tab:hover:not(.active) { color: var(--text); }

  .section { display: none; }
  .section.active { display: block; }

  .badge-vehiculo {
    display: inline-block; padding: 4px 12px; border-radius: 9px; font-size: 11px; font-weight: 700;
    background: #f3e8ff; color: #6b21a8; border: 1px solid rgba(107,33,168,.15);
    margin-top: 4px;
  }

  /* Login screen */
  #login-screen, #profile-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg); z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; overflow-y: auto;
  }
  #login-screen.hidden { display: none; }
  .login-error { color: var(--danger); font-size: 14px; margin-top: 12px; min-height: 20px; }

  /* Historial */
  .historial-item {
    background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
    padding: 15px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .historial-info { flex: 1; }
  .historial-nombre { font-weight: 700; font-size: 15px; color: var(--text); }
  .historial-fecha { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .historial-empty { text-align: center; color: var(--text-muted); padding: 40px 20px; }

  /* Logout button */
  .logout-btn {
    position: fixed; top: 14px; right: 14px; z-index: 101;
    background: #fff;
    border: 1px solid var(--border); border-radius: 99px; box-shadow: var(--shadow);
    padding: 6px 14px; font-size: 12px; font-weight: 600; font-family: inherit;
    color: var(--text-muted); cursor: pointer;
  }
  .logout-btn:hover { background: var(--danger-light); color: #b91c1c; border-color: rgba(239,68,68,.3); }

  /* Tarjeta de perfil de profesor (pantalla de selección) */
  .profile-card {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px 18px; margin-bottom: 12px; cursor: pointer;
    font-size: 15px; font-weight: 700; color: var(--text);
    transition: all .15s ease; animation: slideUp 0.35s ease-out both;
  }
  .profile-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .profile-card:active { transform: scale(0.98); background: #e0e7ff; }
  .profile-card .chev { color: var(--text-muted); font-size: 18px; }
  .profile-empty-msg {
    text-align: center; color: var(--text-muted); font-size: 13px;
    padding: 4px 6px 16px; line-height: 1.5;
  }
  .profile-error-msg {
    text-align: center; color: #dc2626; font-size: 13px;
    padding: 4px 6px 16px; line-height: 1.5;
  }

  /* Indicador de perfil activo (cabecera de main-app) */
  .perfil-activo {
    position: fixed; top: 14px; left: 14px; z-index: 101;
    display: flex; align-items: center; gap: 8px;
    background: #fff;
    border: 1px solid var(--border); border-radius: 99px; box-shadow: var(--shadow);
    padding: 6px 8px 6px 14px; font-size: 12px; font-family: inherit;
  }
  .perfil-activo span { color: var(--text-muted); font-weight: 600; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .perfil-activo button {
    background: var(--primary-light); border: 1px solid rgba(79,70,229,.2); border-radius: 99px;
    padding: 4px 10px; font-size: 11px; font-weight: 700; font-family: inherit;
    color: var(--primary-dark); cursor: pointer; transition: all .15s ease;
  }
  .perfil-activo button:hover { background: #e0e7ff; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="header" style="margin-bottom:36px">
    <div class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 12l3.5-3.5"/><path d="M7.5 14.5a5 5 0 0 1 9 0"/></svg>
    </div>
    <h1>KMAlumnos</h1>
    <p class="subtitle">Inicia sesión con tu cuenta de la app de escritorio</p>
  </div>
  <div class="card" style="width:100%;max-width:300px;text-align:center">
    <input type="email" id="login-email" placeholder="Email" autocomplete="username">
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" style="margin-top:12px">
    <div class="login-error" id="login-error"></div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="iniciarSesion()">Entrar</button>
    <p class="subtitle" style="margin-top:16px;font-size:12.5px">¿Sin cuenta? Créala en la aplicación de escritorio.</p>
  </div>
</div>

<!-- PROFILE SCREEN -->
<div id="profile-screen" style="display:none">
  <div class="header" style="margin-bottom:36px">
    <div class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 12l3.5-3.5"/><path d="M7.5 14.5a5 5 0 0 1 9 0"/></svg>
    </div>
    <h1>¿Quién eres?</h1>
    <p class="subtitle">Elige tu perfil para continuar</p>
  </div>
  <div id="profesores-list" style="width:100%;max-width:340px"></div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <button class="logout-btn" onclick="cerrarSesion()">Salir</button>

  <div class="perfil-activo" id="perfil-activo-badge" style="display:none">
    <span id="perfil-activo-nombre"></span>
    <button onclick="cambiarPerfil()">Cambiar</button>
  </div>

  <div class="header">
    <div class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 12l3.5-3.5"/><path d="M7.5 14.5a5 5 0 0 1 9 0"/></svg>
    </div>
    <h1>KMAlumnos</h1>
    <p class="subtitle">Registro de prácticas · Autoescuela</p>
    <span class="version">v1.1.0</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('practica')">Registrar</button>
    <button class="tab" onclick="switchTab('alumno')">Nuevo Alumno</button>
    <button class="tab" onclick="switchTab('historial')">Historial</button>
  </div>

  <!-- SECCIÓN: REGISTRAR PRÁCTICA -->
  <div id="section-practica" class="section active">
    <div id="form-section">
      <div class="card">
        <div class="field-gap">
          <label>Vehículo</label>
          <div class="select-wrap">
            <select id="vehiculo-select" onchange="onVehiculoChange()">
              <option value="">Cargando vehículos...</option>
            </select>
          </div>
        </div>

        <div class="field-gap">
          <label>Alumno</label>
          <div class="select-wrap">
            <select id="alumno-select" onchange="onAlumnoChange()" disabled>
              <option value="">— Primero selecciona un vehículo —</option>
            </select>
          </div>
          <div class="alumno-info" id="alumno-info"></div>
        </div>

        <div class="field-gap">
          <label>Fecha</label>
          <input type="date" id="fecha-input">
        </div>
      </div>

      <button class="btn btn-primary" id="btn-registrar" onclick="registrar()" disabled>
        <span id="btn-text">✓ Registrar práctica</span>
      </button>
    </div>

    <div class="result" id="result-ok" style="position: relative;">
      <div class="sparkles" id="sparkles"></div>
      <div class="result-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.27"/></svg></div>
      <div class="result-title">¡Práctica registrada!</div>
      <div class="result-msg" id="result-ok-msg"></div>
      <button class="btn-again" onclick="resetForm()">Registrar otra práctica</button>
    </div>

    <div class="result" id="result-err" onclick="hideError()">
      <div class="result-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
      <div class="result-title">Error</div>
      <div class="result-msg" id="result-err-msg"></div>
      <button class="btn-again" onclick="hideError()">Volver a intentarlo</button>
    </div>
  </div>

  <!-- SECCIÓN: NUEVO ALUMNO -->
  <div id="section-alumno" class="section">
    <div class="card">
      <div class="field-gap">
        <label>Nombre del alumno</label>
        <input type="text" id="nuevo-nombre" placeholder="Nombre completo">
      </div>

      <div class="field-gap">
        <label>Tipo de permiso</label>
        <div class="select-wrap">
          <select id="nuevo-permiso">
            <option value="B">B - Coche</option>
            <option value="A">A - Moto</option>
            <option value="A2">A2 - Moto (limitada)</option>
            <option value="AM">AM - Ciclomotor</option>
            <option value="C">C - Camión</option>
          </select>
        </div>
      </div>

      <div class="field-gap">
        <label>Vehículo asignado</label>
        <div class="select-wrap">
          <select id="nuevo-vehiculo">
            <option value="">— Sin asignar —</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-crear-alumno" onclick="crearAlumno()">
      <span id="btn-crear-text">+ Crear alumno</span>
    </button>

    <div class="result" id="result-alumno-ok">
      <div class="result-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.27"/></svg></div>
      <div class="result-title">Alumno creado</div>
      <div class="result-msg" id="result-alumno-ok-msg"></div>
      <button class="btn-again" onclick="resetAlumnoForm()">Crear otro alumno</button>
    </div>

    <div class="result" id="result-alumno-err" onclick="hideAlumnoError()">
      <div class="result-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
      <div class="result-title">Error</div>
      <div class="result-msg" id="result-alumno-err-msg"></div>
      <button class="btn-again" onclick="hideAlumnoError()">Volver a intentarlo</button>
    </div>
  </div>

  <!-- SECCIÓN: HISTORIAL -->
  <div id="section-historial" class="section">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <label style="margin-bottom:0">Prácticas registradas hoy</label>
        <span class="tag" id="historial-count" style="display:none;margin-left:0"></span>
      </div>
      <div id="historial-list">
        <div class="historial-empty">Cargando...</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="cargarHistorial()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Actualizar</button>
  </div>

  <!-- SECCIÓN: DETALLE DE ALUMNO (solo lectura, no es una pestaña del tab bar) -->
  <div id="section-detalle-alumno" class="section">
    <button class="btn btn-secondary" onclick="cerrarDetalleAlumno()">‹ Volver</button>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <label style="margin-bottom:0" id="detalle-alumno-nombre"></label>
        <span class="tag" id="detalle-alumno-total" style="display:none"></span>
      </div>
    </div>
    <div id="detalle-alumno-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dmwoqugdnwgkcqtixhyw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtd29xdWdkbndna2NxdGl4aHl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjA5NjYsImV4cCI6MjA5OTU5Njk2Nn0.8XhWdS0ohrCbZcKpHWKsJz22rY8ASA4IkgpbtE_pHkc';
  const PROFESOR_KEY = 'kmalumnos_profesor'; // localStorage: perfil de profesor activo

  let alumnos = [];
  let vehiculos = [];
  let profesoresDisponibles = [];
  let perfilActivo = null; // { id, nombre } o { id: null, nombre: 'Sin profesor' }

  let supabaseClient = null;
  async function initSupabase() {
    if (supabaseClient) return supabaseClient;
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return supabaseClient;
  }

  // ─── AUTENTICACIÓN ─────────────────────────────────────────────────────────
  async function checkSession() {
    await initSupabase();
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      showLogin();
      return;
    }

    const guardado = localStorage.getItem(PROFESOR_KEY);
    if (guardado) {
      try {
        perfilActivo = JSON.parse(guardado);
        showApp();
        return;
      } catch {
        // JSON inválido: seguimos y pedimos elegir perfil
      }
    }
    showProfiles();
  }

  function showLogin() {
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('profile-screen').style.display = 'none';
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-password').value = '';
    document.getElementById('login-email').focus();
  }

  async function showProfiles() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('profile-screen').style.display = 'flex';

    const list = document.getElementById('profesores-list');
    list.innerHTML = '<div class="profile-empty-msg">Cargando perfiles...</div>';

    let errorCarga = false;
    try {
      const res = await apiFetch('/api/profesores');
      if (!res.ok) throw new Error('Error cargando profesores');
      profesoresDisponibles = await res.json();
    } catch (e) {
      profesoresDisponibles = [];
      errorCarga = true;
    }

    let html = '';
    if (errorCarga) {
      html += '<div class="profile-error-msg">No se pudo cargar la lista de profesores. Puedes continuar sin perfil.</div>';
    } else if (!profesoresDisponibles.length) {
      html += '<div class="profile-empty-msg">Esta autoescuela aún no tiene profesores dados de alta.</div>';
    } else {
      html += profesoresDisponibles.map(p =>
        `<div class="profile-card" data-id="${p.id}">
          <span>${escapeHtml(p.nombre)}</span><span class="chev">›</span>
        </div>`
      ).join('');
    }
    html += `<div class="profile-card" id="perfil-sin-profesor"><span>Sin profesor</span><span class="chev">›</span></div>`;
    list.innerHTML = html;

    // Data embebida solo como id numérico (data-id); el nombre se busca en
    // profesoresDisponibles (variable JS), nunca se inyecta en el atributo.
    list.querySelectorAll('.profile-card[data-id]').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id);
        const p = profesoresDisponibles.find(x => x.id === id);
        seleccionarPerfil(id, p ? p.nombre : '');
      });
    });
    document.getElementById('perfil-sin-profesor').addEventListener('click', () => {
      seleccionarPerfil(null, 'Sin profesor');
    });
  }

  function seleccionarPerfil(id, nombre) {
    perfilActivo = { id, nombre };
    localStorage.setItem(PROFESOR_KEY, JSON.stringify(perfilActivo));
    showApp();
  }

  function cambiarPerfil() {
    showProfiles();
  }

  function showApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('profile-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('fecha-input').value = new Date().toLocaleDateString('sv-SE');

    const badge = document.getElementById('perfil-activo-badge');
    if (perfilActivo) {
      document.getElementById('perfil-activo-nombre').innerHTML = escapeHtml(perfilActivo.nombre);
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }

    cargarDatos();
  }

  async function iniciarSesion() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!email || !password) {
      errorEl.textContent = 'Introduce tu email y contraseña.';
      return;
    }

    errorEl.textContent = '';

    try {
      await initSupabase();
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        const msg = error.message || '';
        errorEl.textContent = /invalid|credentials|password|email/i.test(msg)
          ? 'Email o contraseña incorrectos'
          : msg;
        return;
      }

      localStorage.removeItem(PROFESOR_KEY);
      perfilActivo = null;
      await showProfiles();
    } catch (e) {
      errorEl.textContent = 'Error de conexión';
    }
  }

  // Enter para enviar el formulario de login
  document.getElementById('login-email').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') iniciarSesion();
  });
  document.getElementById('login-password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') iniciarSesion();
  });

  async function cerrarSesion() {
    await supabaseClient?.auth.signOut();
    localStorage.removeItem(PROFESOR_KEY);
    perfilActivo = null;
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
    showLogin();
  }

  // ─── API FETCH CON TOKEN DE SESIÓN ─────────────────────────────────────────
  async function apiFetch(url, options = {}) {
    await initSupabase();
    const { data: { session } } = await supabaseClient.auth.getSession();
    const headers = { ...(options.headers || {}) };
    if (session?.access_token) headers['Authorization'] = 'Bearer ' + session.access_token;

    const res = await fetch(url, { ...options, headers });

    // Si la sesión es inválida, volver al login
    if (res.status === 401) {
      cerrarSesion();
      throw new Error('Sesión expirada');
    }

    return res;
  }

  // ─── TABS ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('section-detalle-alumno').classList.remove('active');

    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active',
        (tab === 'practica' && i === 0) ||
        (tab === 'alumno' && i === 1) ||
        (tab === 'historial' && i === 2)
      );
    });
    document.getElementById('section-practica').classList.toggle('active', tab === 'practica');
    document.getElementById('section-alumno').classList.toggle('active', tab === 'alumno');
    document.getElementById('section-historial').classList.toggle('active', tab === 'historial');

    if (tab === 'historial') cargarHistorial();
  }

  // ─── DETALLE DE ALUMNO (solo lectura) ─────────────────────────────────────
  let tabAntesDeDetalle = 'practica'; // pestaña a la que se vuelve al cerrar el detalle

  function verPracticasAlumno(id) {
    tabAntesDeDetalle = document.querySelector('.tab.active')?.textContent.includes('Registrar') ? 'practica'
      : document.querySelector('.tab.active')?.textContent.includes('Nuevo') ? 'alumno' : 'historial';
    document.getElementById('section-practica').classList.remove('active');
    document.getElementById('section-alumno').classList.remove('active');
    document.getElementById('section-historial').classList.remove('active');
    document.getElementById('section-detalle-alumno').classList.add('active');
    cargarDetalleAlumno(id);
  }

  function cerrarDetalleAlumno() {
    document.getElementById('section-detalle-alumno').classList.remove('active');
    switchTab(tabAntesDeDetalle);
  }

  async function cargarDetalleAlumno(id) {
    const nombreEl = document.getElementById('detalle-alumno-nombre');
    const totalEl = document.getElementById('detalle-alumno-total');
    const listEl = document.getElementById('detalle-alumno-list');
    nombreEl.textContent = 'Cargando...';
    totalEl.style.display = 'none';
    listEl.innerHTML = '<div class="historial-empty">Cargando...</div>';

    try {
      const res = await apiFetch('/api/practicas-alumno?alumno_id=' + id);
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || 'Error al cargar las prácticas');

      nombreEl.textContent = data.alumno.nombre;
      totalEl.textContent = data.total + (data.total === 1 ? ' práctica' : ' prácticas');
      totalEl.style.display = 'inline-block';

      if (!data.practicas.length) {
        listEl.innerHTML = '<div class="historial-empty">Este alumno todavía no tiene prácticas registradas.</div>';
        return;
      }

      listEl.innerHTML = data.practicas.map(p => {
        const tipoTxt = p.tipo === 'pista' ? 'Pista' : 'Circulación';
        const tieneKm = p.km_final > 0 || p.km_inicial > 0;
        const kmTxt = tieneKm ? (Math.max(0, p.km_final - p.km_inicial) + ' km') : 'Km pendientes';
        const partes = [kmTxt];
        if (p.profesor_nombre) partes.push(escapeHtml(p.profesor_nombre));
        const fechaFmt = typeof p.fecha === 'string' ? p.fecha.split('-').reverse().join('/') : '';
        return `
          <div class="historial-item">
            <div class="historial-info">
              <div class="historial-nombre">${fechaFmt} <span class="tag">${tipoTxt}</span></div>
              <div class="historial-fecha">${partes.join(' · ')}</div>
              ${p.nota ? `<div class="historial-fecha">${escapeHtml(p.nota)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      nombreEl.textContent = 'Alumno';
      listEl.innerHTML = `<div class="historial-empty">${escapeHtml(e.message || 'Error cargando las prácticas.')}</div>`;
    }
  }

  // ─── SPARKLES ──────────────────────────────────────────────────────────────
  function createSparkles() {
    const container = document.getElementById('sparkles');
    container.innerHTML = '';
    for (let i = 0; i < 12; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 0.5 + 's';
      sparkle.style.background = ['#4f46e5','#7c3aed','#059669','#f59e0b'][Math.floor(Math.random()*4)];
      container.appendChild(sparkle);
    }
  }

  // ─── CARGAR DATOS ──────────────────────────────────────────────────────────
  async function cargarDatos() {
    try {
      const [resV, resA] = await Promise.all([
        apiFetch('/api/vehiculos'),
        apiFetch('/api/alumnos')
      ]);

      if (!resV.ok) throw new Error('Error cargando vehículos');
      if (!resA.ok) throw new Error('Error cargando alumnos');

      vehiculos = await resV.json();
      alumnos = await resA.json();

      // Popular selector de vehículos (práctica)
      const selV = document.getElementById('vehiculo-select');
      if (!vehiculos.length) {
        selV.innerHTML = '<option value="">No hay vehículos registrados</option>';
      } else {
        selV.innerHTML = '<option value="">— Selecciona un vehículo —</option>' +
          vehiculos.map(v => `<option value="${v.id}">${escapeHtml(v.nombre)}${v.matricula ? ' (' + escapeHtml(v.matricula) + ')' : ''}</option>`).join('');
      }

      // Popular selector de vehículos (nuevo alumno)
      const selNV = document.getElementById('nuevo-vehiculo');
      selNV.innerHTML = '<option value="">— Sin asignar —</option>' +
        vehiculos.map(v => `<option value="${v.id}">${escapeHtml(v.nombre)}${v.matricula ? ' (' + escapeHtml(v.matricula) + ')' : ''}</option>`).join('');

    } catch (e) {
      document.getElementById('vehiculo-select').innerHTML = '<option value="">Error cargando datos</option>';
    }
  }

  // ─── ESCAPE HTML (prevenir XSS) ────────────────────────────────────────────
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ─── VEHÍCULO/ALUMNO CHANGE ────────────────────────────────────────────────
  function onVehiculoChange() {
    const vehiculoId = document.getElementById('vehiculo-select').value;
    const selA = document.getElementById('alumno-select');
    const info = document.getElementById('alumno-info');
    const btn = document.getElementById('btn-registrar');

    info.style.display = 'none';
    btn.disabled = true;

    if (!vehiculoId) {
      selA.innerHTML = '<option value="">— Primero selecciona un vehículo —</option>';
      selA.disabled = true;
      return;
    }

    const alumnosFiltrados = alumnos.filter(a => a.vehiculo_id == vehiculoId);

    if (!alumnosFiltrados.length) {
      selA.innerHTML = '<option value="">No hay alumnos asignados a este vehículo</option>';
      selA.disabled = true;
      return;
    }

    selA.disabled = false;
    selA.innerHTML = '<option value="">— Selecciona un alumno —</option>' +
      alumnosFiltrados.map(a => `<option value="${a.id}">${escapeHtml(a.nombre)} (${a.permiso})</option>`).join('');
  }

  function onAlumnoChange() {
    const sel = document.getElementById('alumno-select');
    const info = document.getElementById('alumno-info');
    const btn = document.getElementById('btn-registrar');
    const alumno = alumnos.find(a => a.id == sel.value);

    if (alumno) {
      info.style.display = 'block';
      info.innerHTML = `<span class="tag">${escapeHtml(alumno.permiso)}</span> Permiso ${escapeHtml(alumno.permiso)}
        <button class="btn-ver-practicas" onclick="verPracticasAlumno(${alumno.id})">Ver prácticas</button>`;
      btn.disabled = false;
    } else {
      info.style.display = 'none';
      btn.disabled = true;
    }
  }

  // ─── REGISTRAR PRÁCTICA ────────────────────────────────────────────────────
  async function registrar() {
    const alumnoId = document.getElementById('alumno-select').value;
    const fecha = document.getElementById('fecha-input').value;

    if (!alumnoId) { showError('Selecciona un alumno.'); return; }
    if (!fecha) { showError('Selecciona una fecha.'); return; }

    const btn = document.getElementById('btn-registrar');
    const text = document.getElementById('btn-text');
    btn.disabled = true;
    text.innerHTML = '<span class="loading-dots"><span>·</span><span>·</span><span>·</span></span>';

    try {
      const res = await apiFetch('/api/practica', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ alumno_id: parseInt(alumnoId), fecha, profesor_id: perfilActivo ? perfilActivo.id : null })
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showError(data.error || 'Error al registrar la práctica.');
        btn.disabled = false;
        text.innerHTML = '✓ Registrar práctica';
        return;
      }

      const alumnoNombre = alumnos.find(a => a.id == alumnoId)?.nombre || '';
      const fechaFmt = fecha.split('-').reverse().join('/');
      document.getElementById('result-ok-msg').textContent =
        `${alumnoNombre} — ${fechaFmt}\nKm pendientes de asignar desde la app.`;
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result-ok').classList.add('ok');
      document.getElementById('result-ok').style.display = 'block';
      createSparkles();

    } catch (e) {
      showError('No se pudo conectar con el servidor.');
      btn.disabled = false;
      text.innerHTML = '✓ Registrar práctica';
    }
  }

  // ─── ERRORES ───────────────────────────────────────────────────────────────
  let errTimer = null;
  function showError(msg) {
    clearTimeout(errTimer);
    document.getElementById('result-err-msg').textContent = msg;
    document.getElementById('result-err').classList.add('err');
    document.getElementById('result-err').style.display = 'block';
    errTimer = setTimeout(hideError, 3500);
  }

  function hideError() {
    clearTimeout(errTimer);
    document.getElementById('result-err').classList.remove('err');
    document.getElementById('result-err').style.display = 'none';
  }

  function resetForm() {
    document.getElementById('result-ok').classList.remove('ok');
    document.getElementById('result-ok').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('vehiculo-select').value = '';
    document.getElementById('alumno-select').innerHTML = '<option value="">— Primero selecciona un vehículo —</option>';
    document.getElementById('alumno-select').disabled = true;
    document.getElementById('alumno-info').style.display = 'none';
    document.getElementById('fecha-input').value = new Date().toLocaleDateString('sv-SE');
    document.getElementById('btn-registrar').disabled = true;
    document.getElementById('btn-text').innerHTML = '✓ Registrar práctica';
  }

  // ─── CREAR ALUMNO ──────────────────────────────────────────────────────────
  async function crearAlumno() {
    const nombre = document.getElementById('nuevo-nombre').value.trim();
    const permiso = document.getElementById('nuevo-permiso').value;
    const vehiculoId = document.getElementById('nuevo-vehiculo').value;

    if (!nombre) { showAlumnoError('Introduce el nombre del alumno.'); return; }

    const btn = document.getElementById('btn-crear-alumno');
    const text = document.getElementById('btn-crear-text');
    btn.disabled = true;
    text.innerHTML = '<span class="loading-dots"><span>·</span><span>·</span><span>·</span></span>';

    try {
      const res = await apiFetch('/api/crear-alumno', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre,
          permiso,
          vehiculo_id: vehiculoId ? parseInt(vehiculoId) : null,
          profesor_id: perfilActivo ? perfilActivo.id : null
        })
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showAlumnoError(data.error || 'Error al crear el alumno.');
        btn.disabled = false;
        text.innerHTML = '+ Crear alumno';
        return;
      }

      document.getElementById('result-alumno-ok-msg').textContent =
        `${nombre} — Permiso ${permiso}${vehiculoId ? '\nVehículo asignado correctamente.' : '\nSin vehículo asignado.'}`;
      document.getElementById('btn-crear-alumno').style.display = 'none';
      document.getElementById('result-alumno-ok').classList.add('ok');
      document.getElementById('result-alumno-ok').style.display = 'block';

      await cargarDatos();

    } catch (e) {
      showAlumnoError('No se pudo conectar con el servidor.');
      btn.disabled = false;
      text.innerHTML = '+ Crear alumno';
    }
  }

  let alumnoErrTimer = null;
  function showAlumnoError(msg) {
    clearTimeout(alumnoErrTimer);
    document.getElementById('result-alumno-err-msg').textContent = msg;
    document.getElementById('result-alumno-err').classList.add('err');
    document.getElementById('result-alumno-err').style.display = 'block';
    alumnoErrTimer = setTimeout(hideAlumnoError, 3500);
  }

  function hideAlumnoError() {
    clearTimeout(alumnoErrTimer);
    document.getElementById('result-alumno-err').classList.remove('err');
    document.getElementById('result-alumno-err').style.display = 'none';
  }

  function resetAlumnoForm() {
    document.getElementById('result-alumno-ok').classList.remove('ok');
    document.getElementById('result-alumno-ok').style.display = 'none';
    document.getElementById('btn-crear-alumno').style.display = '';
    document.getElementById('btn-crear-alumno').disabled = false;
    document.getElementById('btn-crear-text').innerHTML = '+ Crear alumno';
    document.getElementById('nuevo-nombre').value = '';
    document.getElementById('nuevo-permiso').value = 'B';
    document.getElementById('nuevo-vehiculo').value = '';
  }

  // ─── HISTORIAL ─────────────────────────────────────────────────────────────
  async function cargarHistorial() {
    const list = document.getElementById('historial-list');
    list.innerHTML = '<div class="historial-empty">Cargando...</div>';

    try {
      const res = await apiFetch('/api/historial');
      if (!res.ok) throw new Error('Error cargando historial');
      
      const practicas = await res.json();

      const count = document.getElementById('historial-count');
      if (count) {
        count.textContent = practicas.length;
        count.style.display = practicas.length ? 'inline-block' : 'none';
      }

      if (!practicas.length) {
        list.innerHTML = '<div class="historial-empty">No hay prácticas registradas hoy desde esta web.</div>';
        return;
      }

      list.innerHTML = practicas.map(p => `
        <div class="historial-item">
          <div class="historial-info">
            <div class="historial-nombre">${escapeHtml(p.alumno_nombre)}</div>
            <div class="historial-fecha">${p.fecha} · ${escapeHtml(p.vehiculo_nombre)}</div>
          </div>
          <button class="btn-danger" onclick="cancelarPractica(${p.id}, '${escapeHtml(p.alumno_nombre)}')">✕ Cancelar</button>
        </div>
      `).join('');

    } catch (e) {
      list.innerHTML = '<div class="historial-empty">Error cargando historial.</div>';
    }
  }

  async function cancelarPractica(id, nombre) {
    if (!confirm(`¿Cancelar la práctica de ${nombre}?`)) return;

    try {
      const res = await apiFetch('/api/cancelar-practica', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ practica_id: id })
      });

      const data = await res.json();
      if (res.ok && data.ok) {
        cargarHistorial();
      } else {
        alert(data.error || 'Error al cancelar');
      }
    } catch (e) {
      alert('Error de conexión');
    }
  }

  // ─── INIT ──────────────────────────────────────────────────────────────────
  checkSession();
</script>
</body>
</html>
